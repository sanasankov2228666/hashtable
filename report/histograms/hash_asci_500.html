<!DOCTYPE html>

		body {
			font-family: Arial;
			margin: 20px;
		}
		.histogram-wrapper {
			overflow-x: auto;
			width: 100%;
			border: 1px solid #ccc;
			padding: 15px;
			background: #f9f9f9;
		}
		.histogram {
			display: flex;
			align-items: flex-end;
			gap: 2px;
			min-width: max-content;
			height: 500px;
			border-bottom: 2px solid #333;
		}
		.bar {
			width: 12px;
			background: #4682b4;
			border-radius: 3px 3px 0 0;
			transition: all 0.2s;
		}
		.bar:hover {
			background: #ff6347;
		}
		.label {
			width: 12px;
			text-align: center;
			font-size: 8px;
			color: #666;
		}
		.labels {
			display: flex;
			gap: 2px;
			margin-top: 5px;
		}
		.stats {
			margin-bottom: 15px;
			padding: 10px;
			background: #e8f0fe;
			border-radius: 5px;
		}
	</style>
</head>
